subnet:
  name: distillation
  version: "0.2.0"
  description: >
    Competitive model distillation subnet for Bittensor.
    Miners submit distilled versions of GLM-5 (744B) that are ≤10% of teacher size.
    Validator evaluates via KL-divergence of logprobs on SweInfinite coding prompts.
    Winner-take-all: lowest KL-divergence gets all weight.

teacher:
  model: "zai-org/GLM-5"
  params_b: 744.0
  vocab_size: 151552

constraints:
  max_student_ratio: 0.1       # ≤ 74.4B params
  vocab_must_match: true       # Same tokenizer as teacher
  revision_pinned: true        # Commitments include HF git SHA

evaluation:
  metric: kl_divergence        # KL(teacher || student)
  dataset: SweInfinite         # Coding problem prompts
  samples_per_epoch: 5
  max_tokens: 128
  top_k_logprobs: 50
  scoring: winner_take_all     # Lowest KL-div gets weight 1.0

commitment:
  method: set_reveal_commitment
  format: '{"model": "<hf_repo>", "revision": "<git_sha>"}'
  read_method: get_all_revealed_commitments
